<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | Контакты</title>
    <link rel="stylesheet" href="src/style.css">
    <meta name="description" content="Контакты и форма для связи.">
</head>

<body>

    <nav>
        <div class="container">
            <div class="logo">Портфолио</div>
            <ul>
                <li><a href="index.html">Обо мне</a></li>
                <li><a href="projects.html">Работы</a></li>
                <li><a href="contact.html" class="active">Контакты</a></li>
            </ul>
        </div>
    </nav>

    <header>
        <div class="container header-content">
            <h1>Связаться со мной</h1>
            <p class="subtitle">По учебным и проектным вопросам</p>
        </div>
    </header>

    <main class="container">
        <section class="info-block">
            <h2>Контакты</h2>
            <div class="grid">

                <div class="card">
                    <h3>Прямые ссылки</h3>
                    <ul>
                        <li>Email: <a href="mailto:nastagalina246@gmail.com">nastagalina246@gmail.com</a></li>
                        <li>Telegram: <a href="https://t.me/Teon_Koonaki" target="_blank"
                                rel="noopener">t.me/@Teon_Koonaki</a></li>
                        <li>GitHub: <a href="https://github.com/Anastasia-Webs" target="_blank"
                                rel="noopener">github.com/Anastasia-Webs</a></li>
                    </ul>
                </div>


                <div class="card">
                    <h3>Написать сообщение</h3>
                    <form class="contact-form" action="#" method="post">
                        <div class="form-group">
                            <label for="name">Имя</label>
                            <input type="text" id="name" name="name" placeholder="Ваше имя" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Сообщение</label>
                            <textarea id="message" name="message" rows="5" placeholder="Текст сообщения"
                                required></textarea>
                        </div>
                        <button type="submit">Отправить</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026</p>
        </div>
    </footer>

</body>

</html>
